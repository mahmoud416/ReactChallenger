services:
  web:
    build:
      context: .
      dockerfile: DOCKERFILE.dev
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      - .:/app

  test:
    build:
      context: .
      dockerfile: DOCKERFILE.dev
    command: npm run test
    volumes:
      - /app/node_modules
      - .:/app

  